<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصحح مشاريع الطالبات - UNRWA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;
  --text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;
  --canva:#00c4cc;--youtube:#ff0000;--google:#4285f4;--whatsapp:#25d366;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;direction:rtl}
a{color:var(--accent);text-decoration:none}

/* Layout */
.container{display:flex;height:100vh;width:100%}
.panel-left{width:40%;min-width:340px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{width:60%;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.app-header{background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.app-header h1{font-size:16px;font-weight:600}
.app-header .stats{margin-right:auto;font-size:13px;color:var(--text2)}
.reload-btn{padding:4px 10px;background:var(--border);color:var(--text);border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
.reload-btn:hover{background:var(--accent)}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 14px;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{background:var(--border);color:var(--text2);font-size:11px;padding:1px 6px;border-radius:10px;margin-right:4px}
.tab.active .badge{background:var(--accent);color:#fff}

/* Search */
.search-bar{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-bar input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text2)}

/* Student List */
.student-list{flex:1;overflow-y:auto;padding:8px}
.student-list::-webkit-scrollbar{width:6px}
.student-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Student Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;transition:.2s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.card-name{font-size:15px;font-weight:600;flex:1}
.card-div{font-size:12px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:4px}
.card-total{font-size:18px;font-weight:700;min-width:50px;text-align:center;padding:4px 8px;border-radius:6px}

/* Links */
.links-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.link-btn{padding:5px 12px;border-radius:6px;border:none;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:.2s}
.link-btn:hover{opacity:.85;transform:scale(1.03)}
.link-btn.canva{background:var(--canva)}
.link-btn.youtube{background:var(--youtube)}
.link-btn.google{background:var(--google)}
.link-btn.whatsapp{background:var(--whatsapp)}
.link-btn.other{background:var(--text2)}
.link-warn{font-size:12px;color:var(--yellow);padding:4px 8px;background:rgba(210,153,34,.15);border-radius:4px;display:inline-block}

/* WhatsApp add */
.wa-add{display:flex;gap:6px;margin-bottom:8px}
.wa-add input{flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;direction:ltr;text-align:left}
.wa-add input:focus{border-color:var(--whatsapp)}
.wa-add button{padding:6px 12px;background:var(--whatsapp);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}

/* Grading */
.grade-section{margin-bottom:6px}
.grade-label{font-size:13px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.grade-btns{display:flex;flex-wrap:wrap;gap:4px}
.grade-btn{min-width:38px;min-height:38px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;transition:.2s}
.grade-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.1)}
.grade-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.broken-btn{padding:8px 14px;background:rgba(248,81,73,.15);color:var(--red);border:1px solid var(--red);border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;margin-top:4px;transition:.2s}
.broken-btn:hover{background:rgba(248,81,73,.3)}

/* Notes */
.card-notes{font-size:12px;color:var(--yellow);margin-top:4px}

/* Save indicator */
.save-indicator{position:fixed;bottom:20px;left:20px;background:var(--green);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.save-indicator.show{opacity:1}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text2);gap:12px}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.data-source{font-size:11px;color:var(--text2);padding:2px 6px;background:var(--bg);border-radius:3px}

/* Right panel */
.iframe-header{background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.iframe-header .student-name{font-size:15px;font-weight:600;flex:1}
.iframe-header .open-btn{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.iframe-container{flex:1;position:relative;background:#000}
.iframe-container iframe{width:100%;height:100%;border:none}
.iframe-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:16px;padding:20px;text-align:center}
.iframe-placeholder .icon{font-size:64px;opacity:.4}
.iframe-placeholder p{font-size:16px}
.iframe-blocked{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:16px;padding:20px;text-align:center}
.iframe-blocked .warn-icon{font-size:48px}
.iframe-blocked p{font-size:15px;max-width:400px}
.iframe-blocked .open-big-btn{padding:14px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-family:inherit;margin-top:8px}

/* Export */
.export-bar{padding:8px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;align-items:center}
.export-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.export-btn:hover{opacity:.85}

/* Color helpers */
.total-green{color:var(--green)}
.total-yellow{color:var(--yellow)}
.total-red{color:var(--red)}

/* WhatsApp Import Modal */
.wa-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:16px}
.wa-modal-overlay.show{display:flex}
.wa-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.wa-modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.wa-modal-header h2{font-size:16px;font-weight:600;flex:1}
.wa-modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px}
.wa-modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.wa-modal-body label{display:block;font-size:14px;color:var(--text2);margin-bottom:6px}
.wa-modal-body select,.wa-modal-body textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:inherit;padding:10px;outline:none}
.wa-modal-body select:focus,.wa-modal-body textarea:focus{border-color:var(--accent)}
.wa-modal-body textarea{min-height:150px;resize:vertical;direction:ltr;text-align:left;margin-bottom:12px}
.wa-modal-body select{margin-bottom:12px}
.wa-parse-btn{padding:10px 20px;background:var(--whatsapp);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;width:100%;margin-bottom:12px}
.wa-parse-btn:hover{opacity:.85}
/* Results */
.wa-results{margin-top:12px}
.wa-result-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.wa-result-sender{font-size:14px;font-weight:600;color:var(--whatsapp);margin-bottom:4px}
.wa-result-content{font-size:13px;color:var(--text2);margin-bottom:6px;word-break:break-all}
.wa-result-content a{color:var(--accent)}
.wa-result-match{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wa-result-match select{flex:1;min-width:150px;padding:6px 8px;font-size:13px}
.wa-result-match .match-status{font-size:12px;padding:2px 8px;border-radius:4px}
.match-auto{background:rgba(63,185,80,.15);color:var(--green)}
.match-manual{background:rgba(210,153,34,.15);color:var(--yellow)}
.wa-result-file{font-size:12px;color:var(--canva);margin-bottom:4px}
.wa-save-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;width:100%;margin-top:12px}
.wa-save-btn:hover{opacity:.85}
.wa-import-btn{padding:8px 16px;background:var(--whatsapp);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}

/* Mobile toggle button */
.mobile-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:900;width:56px;height:56px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);font-family:inherit}
.mobile-back{display:none;padding:6px 12px;background:var(--border);color:var(--text);border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;margin-left:auto}

/* Responsive — Mobile */
@media(max-width:800px){
  .container{flex-direction:column}
  .panel-left,.panel-right{width:100%;min-width:0;height:100vh;height:100dvh;border-left:none}
  .panel-right{display:none}
  .panel-left{display:flex}
  body.show-viewer .panel-left{display:none}
  body.show-viewer .panel-right{display:flex}
  .mobile-toggle{display:block}
  .mobile-back{display:block}
  /* Export bar always visible */
  .export-bar{position:sticky;bottom:0;z-index:100;padding:10px 12px;border-top:2px solid var(--border);background:var(--surface)}
  .wa-import-btn{padding:10px 18px;font-size:14px}
  /* Bigger touch targets */
  .tab{padding:12px 16px;font-size:15px}
  .grade-btn{min-width:42px;min-height:42px;font-size:15px}
  .link-btn{padding:8px 14px;font-size:14px}
  .broken-btn{padding:10px 16px;font-size:14px;width:100%}
  .card{padding:14px}
  .card-name{font-size:16px}
  .card-total{font-size:20px}
  .search-bar input{padding:10px 14px;font-size:15px}
  .wa-add input{padding:8px 12px;font-size:14px}
  .wa-add button{padding:8px 14px;font-size:14px}
  .export-btn{padding:10px 18px;font-size:14px}
  .iframe-blocked .open-big-btn{padding:16px 36px;font-size:18px}
  .save-indicator{bottom:80px}
  .mobile-toggle{bottom:70px}
}
</style>
</head>
<body>

<div class="container">
  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="app-header">
      <h1>مصحح المشاريع</h1>
      <span class="data-source" id="dataSource"></span>
      <span class="stats" id="globalStats"></span>
      <button class="reload-btn" onclick="init()" title="تحديث البيانات">تحديث</button>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="بحث بالاسم...">
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="export-bar">
      <button class="export-btn" onclick="exportCSV()">تصدير CSV</button>
      <button class="wa-import-btn" onclick="openWaImport()">💬 استيراد واتساب</button>
      <span style="font-size:12px;color:var(--text2)" id="exportInfo"></span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="iframe-header">
      <span class="student-name" id="currentStudent">اضغط على رابط لعرض المشروع</span>
      <button class="open-btn" id="openNewTab" onclick="openInNewTab()" style="display:none">فتح في تاب جديد</button>
      <button class="mobile-back" onclick="toggleView()">رجوع للقائمة</button>
    </div>
    <div class="iframe-container" id="iframeContainer">
      <div class="iframe-placeholder" id="iframePlaceholder">
        <div class="icon">📂</div>
        <p>اختاري طالبة واضغطي على رابط المشروع لعرضه هنا</p>
      </div>
      <div class="iframe-blocked" id="iframeBlocked">
        <div class="warn-icon">⚠️</div>
        <p>هذا الموقع لا يسمح بالعرض المدمج (iframe)</p>
        <button class="open-big-btn" onclick="openInNewTab()">افتح الرابط في تاب جديد</button>
      </div>
      <iframe id="projectFrame" style="display:none" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
  </div>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="toggleView()" title="عرض المشروع">📂</button>
<div class="save-indicator" id="saveIndicator">✓ محفوظ</div>

<!-- WhatsApp Import Modal -->
<div class="wa-modal-overlay" id="waModal">
  <div class="wa-modal">
    <div class="wa-modal-header">
      <h2>💬 استيراد من واتساب</h2>
      <button class="wa-modal-close" onclick="closeWaImport()">&times;</button>
    </div>
    <div class="wa-modal-body">
      <label>الصف:</label>
      <select id="waGrade">
        <option value="سابع">السابع</option>
        <option value="ثامن">الثامن</option>
        <option value="تاسع">التاسع</option>
        <option value="عاشر">العاشر</option>
      </select>

      <label>رفع ملف ZIP أو TXT المصدّر من واتساب:</label>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <label style="flex:1;min-width:200px;padding:14px;background:var(--bg);border:2px dashed var(--border);border-radius:8px;cursor:pointer;text-align:center;color:var(--text2);font-size:14px;transition:.2s" id="zipDropZone">
          <span id="zipLabel">📦 اضغطي لاختيار ملف (ZIP أو TXT)</span>
          <input type="file" accept=".zip,.txt,.text" id="waZipFile" onchange="handleFileUpload(this)" style="display:none">
        </label>
      </div>

      <label>أو الصقي المحادثة يدوياً:</label>
      <textarea id="waChatText" placeholder="انسخي المحادثة من واتساب ويب والصقيها هنا..."></textarea>

      <button class="wa-parse-btn" onclick="parseWaChat()">🔍 استخراج الروابط والملفات</button>

      <div id="waMediaInfo" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:12px">
        <div style="font-size:14px;color:var(--green);margin-bottom:6px" id="waMediaCount"></div>
        <div style="font-size:12px;color:var(--text2)" id="waMediaList"></div>
      </div>

      <div class="wa-results" id="waResults"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ==== ZIP MEDIA STORAGE ====
let waMediaFiles = {}; // filename -> blob URL

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const label = document.getElementById('zipLabel');
  const dropZone = document.getElementById('zipDropZone');

  // Handle TXT file directly
  if (file.name.endsWith('.txt') || file.type === 'text/plain') {
    label.textContent = '⏳ جاري قراءة الملف...';
    try {
      const text = await file.text();
      document.getElementById('waChatText').value = text;
      label.textContent = `✅ ${file.name}`;
      dropZone.style.borderColor = 'var(--green)';
    } catch(e) {
      label.textContent = '❌ خطأ في قراءة الملف النصي';
      dropZone.style.borderColor = 'var(--red)';
    }
    return;
  }

  // Handle ZIP file
  const sizeMB = (file.size / 1024 / 1024).toFixed(1);
  label.textContent = `⏳ جاري فك الضغط (${sizeMB} MB)...`;

  try {
    const zip = await JSZip.loadAsync(file);
    let chatText = '';
    waMediaFiles = {};
    const mediaNames = [];

    // First pass: find chat text file only (fast)
    for (const [filename, zipEntry] of Object.entries(zip.files)) {
      if (zipEntry.dir) continue;
      const name = filename.split('/').pop();
      if (name.endsWith('.txt')) {
        const blob = await zipEntry.async('blob');
        chatText = await blob.text();
        break;
      }
    }

    if (chatText) {
      document.getElementById('waChatText').value = chatText;
      label.textContent = `✅ ${file.name} — جاري تحميل الوسائط...`;
      dropZone.style.borderColor = 'var(--green)';

      // Second pass: load media files (slower, non-blocking)
      for (const [filename, zipEntry] of Object.entries(zip.files)) {
        if (zipEntry.dir) continue;
        const name = filename.split('/').pop();
        if (name.endsWith('.txt')) continue;
        try {
          const blob = await zipEntry.async('blob');
          const blobUrl = URL.createObjectURL(blob);
          waMediaFiles[name] = { url: blobUrl, type: blob.type || guessType(name), size: blob.size };
          mediaNames.push(name);
        } catch(e) {
          // Skip files that fail to load
          mediaNames.push(name + ' (فشل التحميل)');
        }
      }

      label.textContent = `✅ ${file.name}`;

      if (mediaNames.length > 0) {
        const info = document.getElementById('waMediaInfo');
        info.style.display = '';
        document.getElementById('waMediaCount').textContent = `📎 ${mediaNames.length} ملف وسائط`;
        document.getElementById('waMediaList').textContent = mediaNames.slice(0, 10).join('، ') + (mediaNames.length > 10 ? `... و ${mediaNames.length - 10} ملف آخر` : '');
      }
    } else {
      label.textContent = '❌ لم يتم العثور على ملف المحادثة داخل ZIP';
      dropZone.style.borderColor = 'var(--red)';
    }

  } catch(e) {
    console.error('ZIP error:', e);
    // Show helpful error message
    let msg = '❌ خطأ في قراءة الملف المضغوط';
    if (file.size > 100 * 1024 * 1024) {
      msg += ' — الملف كبير جداً. جربي رفع ملف .txt بدل ZIP';
    } else {
      msg += ' — جربي رفع ملف .txt مباشرة';
    }
    label.textContent = msg;
    dropZone.style.borderColor = 'var(--red)';
  }
}

function guessType(name) {
  const ext = name.split('.').pop().toLowerCase();
  const types = {jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',heic:'image/heic',
    mp4:'video/mp4',mov:'video/quicktime',pdf:'application/pdf',doc:'application/msword',docx:'application/msword'};
  return types[ext] || '';
}

// ==== CONFIG ====
const SHEET_ID = '1Cx8ZSkWou6dinH6xqUr3AeepzlW2jOgQ9Q2oK0_iSuI';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

// Column mapping (0-indexed) per grade
// A=0 Timestamp, B=1 Name, C=2 Grade
// Each grade section: Division, Link1, Link2, Notes
const GRADE_COLS = {
  'الصف السابع':  { div: 3,  links: [4, 5],   notes: 6,  linkLabels: ['وثيقة','فيديو'] },
  'الصف الثامن':  { div: 7,  links: [8, 9],   notes: 10, linkLabels: ['كتاب إلكتروني','استبانة'] },
  'الصف التاسع':  { div: 11, links: [12, 13],  notes: 14, linkLabels: ['سيناريو','فيديو'] },
  'الصف العاشر':  { div: 15, links: [16, 17],  notes: 18, linkLabels: ['خطة مشروع','بروشور'] }
};

const GRADE_SHORT = {
  'الصف السابع': 'سابع',
  'الصف الثامن': 'ثامن',
  'الصف التاسع': 'تاسع',
  'الصف العاشر': 'عاشر'
};

// ==== STATE ====
let students = [];
let grades = {};
let waLinks = {};
let currentGrade = '';
let currentUrl = '';

const STORAGE_KEY = 'grader_grades_v2';
const WA_STORAGE_KEY = 'grader_wa_links_v2';

// ==== CSV PARSER ====
function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i+1] === '"') { current += '"'; i++; }
        else { inQuotes = false; }
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(current); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current); current = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else {
        current += ch;
      }
    }
  }
  if (current || row.length) { row.push(current); rows.push(row); }
  return rows;
}

// ==== DATA LOADING ====
async function loadFromSheet() {
  const resp = await fetch(SHEET_CSV_URL);
  if (!resp.ok) throw new Error('Sheet fetch failed: ' + resp.status);
  const text = await resp.text();
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error('No data rows');
  return csvToStudents(rows.slice(1)); // skip header
}

async function loadFromJSON() {
  const resp = await fetch('data.json');
  if (!resp.ok) throw new Error('data.json fetch failed');
  return await resp.json();
}

function csvToStudents(rows) {
  // Build map: name+grade → latest row (by timestamp)
  const map = new Map();

  for (const cols of rows) {
    const name = (cols[1] || '').trim();
    const gradeRaw = (cols[2] || '').trim();
    if (!name || !gradeRaw) continue;

    const gradeCfg = GRADE_COLS[gradeRaw];
    if (!gradeCfg) continue;

    const grade = GRADE_SHORT[gradeRaw] || gradeRaw;
    const key = grade + '|' + name;
    const timestamp = cols[0] || '';

    // Keep latest submission
    if (map.has(key) && map.get(key).timestamp > timestamp) continue;

    const division = (cols[gradeCfg.div] || '').trim();
    const links = gradeCfg.links
      .map(i => (cols[i] || '').trim())
      .filter(Boolean);
    const notes = (cols[gradeCfg.notes] || '').trim();

    // Deduplicate links
    const uniqueLinks = [...new Set(links)];

    map.set(key, {
      id: key,
      name: name,
      grade: grade,
      division: division,
      links: uniqueLinks,
      linkLabels: gradeCfg.linkLabels,
      notes: notes,
      timestamp: timestamp
    });
  }

  return Array.from(map.values());
}

async function init() {
  const list = document.getElementById('studentList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><span>جاري تحميل البيانات...</span></div>';

  // Load saved state

  try { waLinks = JSON.parse(localStorage.getItem(WA_STORAGE_KEY)) || {}; } catch(e) { waLinks = {}; }

  let source = '';
  try {
    students = await loadFromSheet();
    source = 'Google Sheet (مباشر)';
  } catch(e) {
    console.warn('Sheet load failed, trying data.json:', e);
    try {
      students = await loadFromJSON();
      source = 'data.json (محلي)';
    } catch(e2) {
      list.innerHTML = '<p style="padding:20px;color:var(--red)">خطأ في تحميل البيانات. تأكدي من الاتصال بالإنترنت أو وجود ملف data.json</p>';
      return;
    }
  }

  // Clean links
  students.forEach(s => {
    s.links = (s.links || []).map(l => typeof l === 'string' ? l.trim() : '').filter(Boolean);
    s.links = [...new Set(s.links)];
    if (!s.linkLabels) s.linkLabels = ['رابط 1','رابط 2'];
  });

  document.getElementById('dataSource').textContent = source;
  currentGrade = '';
  buildTabs();

const BLOCKED_DOMAINS = ['canva.com','facebook.com','instagram.com','tiktok.com'];
function isBlockedDomain(url) {
  try { return BLOCKED_DOMAINS.some(d => new URL(url).hostname.toLowerCase().includes(d)); }
  catch(e) { return false; }
}

// ==== YOUTUBE EMBED ====
function getYouTubeEmbedUrl(url) {
  try {
    const u = new URL(url);
    let videoId = '';
    if (u.hostname.includes('youtube.com') && u.searchParams.get('v')) {
      videoId = u.searchParams.get('v');
    } else if (u.hostname.includes('youtu.be')) {
      videoId = u.pathname.slice(1);
    } else if (u.hostname.includes('youtube.com') && u.pathname.includes('/embed/')) {
      videoId = u.pathname.split('/embed/')[1];
    }
    if (videoId) {
      videoId = videoId.split('&')[0].split('?')[0].split('/')[0];
      return `https://www.youtube.com/embed/${videoId}`;
    }
  } catch(e) {}
  return null;
}

function isYouTubeUrl(url) {
  try {
    const h = new URL(url).hostname.toLowerCase();
    return h.includes('youtube.com') || h.includes('youtu.be');
  } catch(e) { return false; }
}

// ==== GOOGLE DRIVE EMBED ====
function getDriveEmbedUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('drive.google.com') && u.pathname.includes('/file/d/')) {
      const fileId = u.pathname.split('/file/d/')[1].split('/')[0];
      return `https://drive.google.com/file/d/${fileId}/preview`;
    }
  } catch(e) {}
  return null;
}

// ==== TABS ====
function buildTabs() {
  const gradeOrder = ['سابع','ثامن','تاسع','عاشر'];
  const container = document.getElementById('tabsContainer');
  const available = [...new Set(students.map(s => s.grade))];
  available.sort((a,b) => gradeOrder.indexOf(a) - gradeOrder.indexOf(b));

  container.innerHTML = available.map(g => {
    const total = students.filter(s => s.grade === g).length;
    const done = students.filter(s => s.grade === g && isGraded(s)).length;
    return `<div class="tab${currentGrade===g?' active':''}" data-grade="${g}" onclick="selectGrade('${g}')">
      ${g} <span class="badge">${done}/${total}</span>
    </div>`;
  }).join('');

  if (!currentGrade && available.length) {
    currentGrade = available[0];
    const first = container.querySelector('.tab');
    if (first) first.classList.add('active');
  }
}

function selectGrade(g) {
  currentGrade = g;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.grade === g));
  renderList();
  updateStats();
}

function isGraded(s) {
  const g = grades[s.id];
  return g && (g.doc !== undefined || g.video !== undefined || g.pub !== undefined);
}

document.getElementById('searchInput').addEventListener('input', () => renderList());

// ==== RENDER LIST ====
function renderList() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('studentList');

  let filtered = students.filter(s => s.grade === currentGrade);
  if (query) {
    filtered = students.filter(s => s.name.toLowerCase().includes(query));
  }

  filtered.sort((a,b) => {
    const ag = isGraded(a) ? 1 : 0;
    const bg = isGraded(b) ? 1 : 0;
    if (ag !== bg) return ag - bg;
    return a.name.localeCompare(b.name, 'ar');
  });

  list.innerHTML = filtered.length
    ? filtered.map(s => renderCard(s)).join('')
    : '<p style="padding:20px;color:var(--text2);text-align:center">لا توجد نتائج</p>';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderCard(s) {
  const g = grades[s.id] || {};
  const doc = g.doc ?? '';
  const video = g.video ?? '';
  const pub = g.pub ?? '';
  const total = (doc === '' ? 0 : doc) + (video === '' ? 0 : video) + (pub === '' ? 0 : pub);
  const hasGrade = doc !== '' || video !== '' || pub !== '';
  const totalClass = hasGrade ? (total >= 16 ? 'total-green' : total >= 10 ? 'total-yellow' : 'total-red') : '';

  const allLinks = [...s.links];
  const extraLinks = waLinks[s.id] || [];
  extraLinks.forEach(l => { if (!allLinks.includes(l)) allLinks.push(l); });

  const labels = s.linkLabels || [];

  const linksHTML = allLinks.map((link, i) => {
    if (!isValidUrl(link)) {
      return `<span class="link-warn">⚠️ "${esc(link)}" — ليس رابطاً صالحاً</span>`;
    }
    const type = getLinkType(link);
    const isExtra = extraLinks.includes(link) && !s.links.includes(link);
    const cls = isExtra ? ' whatsapp' : (' ' + type);
    const label = isExtra ? '💬 واتساب' : (labels[i] || getLinkLabel(link));
    const escapedId = esc(s.id);
    const escapedName = esc(s.name);
    return `<button class="link-btn${cls}" onclick="loadProject('${escapedId}','${encodeURIComponent(link)}','${escapedName}')" title="${esc(link)}">${label}</button>`;
  }).join('');

  const escapedId = esc(s.id);

  return `<div class="card" id="card-${CSS.escape(s.id)}">
    <div class="card-header">
      <span class="card-name">${esc(s.name)}</span>
      <span class="card-div">${esc(s.division || '')}</span>
      <span class="card-total ${totalClass}">${hasGrade ? total + '/20' : '—'}</span>
    </div>
    <div class="links-row">${linksHTML || '<span style="color:var(--text2);font-size:13px">لا يوجد روابط</span>'}</div>
    <div class="wa-add">
      <input type="text" placeholder="لصق رابط واتساب..." id="wa-${CSS.escape(s.id)}" dir="ltr">
      <button onclick="addWaLink('${escapedId}')">+ إضافة</button>
    </div>
    <div class="grade-section">
      <div class="grade-label">📄 وثيقة (0–7)</div>
      <div class="grade-btns">${renderGradeBtns(s.id, 'doc', 7, doc)}</div>
    </div>
    <div class="grade-section">
      <div class="grade-label">🎬 فيديو (0–7)</div>
      <div class="grade-btns">${renderGradeBtns(s.id, 'video', 7, video)}</div>
    </div>
    <div class="grade-section">
      <div class="grade-label">📸 سكرين شوت النشر (0–6)</div>
      <div class="grade-btns">${renderGradeBtns(s.id, 'pub', 6, pub)}</div>
    </div>
    <button class="broken-btn" onclick="setBroken('${escapedId}')">🔴 رابط لا يعمل ← 7</button>
    ${s.notes ? `<div class="card-notes">📝 ${esc(s.notes)}</div>` : ''}
  </div>`;
}

function renderGradeBtns(id, field, max, current) {
  let html = '';
  const escapedId = esc(id);
  for (let i = 0; i <= max; i++) {
    const sel = current === i ? ' selected' : '';
    html += `<button class="grade-btn${sel}" onclick="setGrade('${escapedId}','${field}',${i})">${i}</button>`;
  }
  return html;
}

function setGrade(id, field, value) {
  if (!grades[id]) grades[id] = {};
  grades[id][field] = value;
  saveGrades();
  refreshCard(id);
  buildTabs();
  updateStats();
}

function setBroken(id) {
  grades[id] = { doc: 3, video: 3, pub: 1 };
  saveGrades();
  refreshCard(id);
  buildTabs();
  updateStats();
}

function refreshCard(id) {
  const s = students.find(st => st.id === id);
  if (!s) return;
  const el = document.getElementById('card-' + CSS.escape(id));
  if (el) {
    const temp = document.createElement('div');
    temp.innerHTML = renderCard(s);
    el.replaceWith(temp.firstElementChild);
  }
}

function addWaLink(id) {

function loadProject(id, encodedUrl, name) {
  const url = decodeURIComponent(encodedUrl);
  currentUrl = url;
  document.getElementById('currentStudent').textContent = name;
  document.getElementById('openNewTab').style.display = '';

  const frame = document.getElementById('projectFrame');
  const placeholder = document.getElementById('iframePlaceholder');
  const blocked = document.getElementById('iframeBlocked');

  // Try YouTube embed
  const ytEmbed = isYouTubeUrl(url) ? getYouTubeEmbedUrl(url) : null;
  // Try Drive embed
  const driveEmbed = !ytEmbed ? getDriveEmbedUrl(url) : null;
  const embedUrl = ytEmbed || driveEmbed;

  if (embedUrl) {
    blocked.style.display = 'none';
    placeholder.style.display = 'none';
    frame.style.display = '';
    frame.removeAttribute('sandbox');
    frame.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    frame.allowFullscreen = true;
    frame.src = embedUrl;
  } else if (isBlockedDomain(url)) {
    frame.style.display = 'none';
    placeholder.style.display = 'none';
    blocked.style.display = 'flex';
  } else {
    blocked.style.display = 'none';
    placeholder.style.display = 'none';
    frame.style.display = '';
    frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
    frame.src = url;
  }

  // On mobile, auto-switch to viewer
  if (isMobile() && !document.body.classList.contains('show-viewer')) {
    toggleView();
  }
}

// ==== EXPORT CSV ====
function exportCSV() {
  const BOM = '\uFEFF';
  const headers = ['الاسم','الصف','الشعبة','وثيقة/7','فيديو/7','نشر/6','المجموع/20','ملاحظة'];
  const rows = students.map(s => {

    const doc = g.doc ?? '';
    const video = g.video ?? '';
    const pub = g.pub ?? '';
    const total = (doc === '' && video === '' && pub === '') ? '' : ((doc||0)+(video||0)+(pub||0));
    return [s.name, s.grade, s.division||'', doc, video, pub, total, s.notes||''].map(v => `"${v}"`).join(',');
  });

  const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `grades_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

let waParseResults = [];

function parseWaChat() {
  const text = document.getElementById('waChatText').value;
  const grade = document.getElementById('waGrade').value;
  if (!text.trim()) return;

  // WhatsApp message patterns (multiple formats)
  // iOS export: [DD/MM/YYYY, HH:MM:SS] Name: message
  // Android export: DD/MM/YYYY, HH:MM - Name: message
  // WhatsApp Web copy: [HH:MM, DD/MM/YYYY] Name: message
  // Arabic format: DD‏/MM‏/YYYY, HH:MM - Name: message
  const msgRegex = /(?:\[?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[,\s]+(\d{1,2}:\d{2}(?::\d{2})?(?:\s*[APap][Mm])?)\]?\s*[-–]\s*|(?:\[(\d{1,2}:\d{2}(?::\d{2})?)[,\s]+(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})\]\s*))([^:]+?):\s*([\s\S]*?)(?=(?:\n(?:\[?\d{1,2}[\/\-\.]|\[\d{1,2}:))|$)/g;

  const messages = [];
  let match;
  while ((match = msgRegex.exec(text)) !== null) {
    const sender = (match[5] || '').trim().replace(/[\u200e\u200f\u202a\u202b\u202c]/g, '');
    const content = (match[6] || '').trim();
    if (sender && content) {
      messages.push({ sender, content });
    }
  }

  // If regex didn't match well, try simpler line-by-line approach
  if (messages.length === 0) {
    const lines = text.split('\n');
    let currentSender = '';
    let currentContent = '';
    for (const line of lines) {
      // Try to detect sender pattern: anything with ": " after a name
      const simpleMatch = line.match(/^.*?[-–\]]\s*([^:]+?):\s*(.+)$/);
      if (simpleMatch) {
        if (currentSender && currentContent) {
          messages.push({ sender: currentSender, content: currentContent });
        }
        currentSender = simpleMatch[1].trim().replace(/[\u200e\u200f\u202a\u202b\u202c]/g, '');
        currentContent = simpleMatch[2].trim();
      } else if (currentSender) {
        currentContent += ' ' + line.trim();
      }
    }
    if (currentSender && currentContent) {
      messages.push({ sender: currentSender, content: currentContent });
    }
  }

  // Extract links and files from messages
  const urlRegex = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  const fileRegex = /<?(\S+\.(jpg|jpeg|png|pdf|docx?|pptx?|xlsx?|mp4|mov|webp|gif|heic|avi|mkv))\s*>?\s*(?:\(file attached\))?/gi;
  const attachRegex = /(file attached|الملف مرفق|تم إرفاق|attached|مرفق|image omitted|video omitted|sticker omitted|document omitted|‎صورة تم حذفها|‎فيديو تم حذفه|‎ملصق تم حذفه|‎مستند تم حذفه)/i;

  waParseResults = [];
  const senderMap = new Map(); // group by sender

  for (const msg of messages) {
    // Skip system messages
    if (msg.sender.includes('تم ') || msg.sender.includes('created') || msg.sender.includes('added') || msg.sender.includes('changed')) continue;

    const urls = msg.content.match(urlRegex) || [];
    const files = [];
    let fileMatch;
    while ((fileMatch = fileRegex.exec(msg.content)) !== null) {
      files.push(fileMatch[1]);
    }
    // Check for attachment indicators
    const hasAttachment = attachRegex.test(msg.content);

    if (urls.length === 0 && files.length === 0 && !hasAttachment) continue;

    if (!senderMap.has(msg.sender)) {
      senderMap.set(msg.sender, { sender: msg.sender, urls: [], files: [], hasAttachments: false });
    }
    const entry = senderMap.get(msg.sender);
    urls.forEach(u => { if (!entry.urls.includes(u)) entry.urls.push(u); });
    files.forEach(f => { if (!entry.files.includes(f)) entry.files.push(f); });
    if (hasAttachment) entry.hasAttachments = true;
  }

  waParseResults = Array.from(senderMap.values());

  // Try to auto-match senders to students
  const gradeStudents = students.filter(s => s.grade === grade);

  const resultsDiv = document.getElementById('waResults');
  if (waParseResults.length === 0) {
    resultsDiv.innerHTML = '<p style="color:var(--yellow);text-align:center;padding:12px">لم يتم العثور على روابط أو ملفات. تأكدي من لصق المحادثة بشكل صحيح.</p>';
    return;
  }

  let html = `<p style="color:var(--green);margin-bottom:12px">تم العثور على <strong>${waParseResults.length}</strong> مرسلة بروابط/ملفات</p>`;

  waParseResults.forEach((r, idx) => {
    // Auto-match: find student whose name is included in sender or vice versa
    let autoMatch = null;
    let bestScore = 0;
    for (const s of gradeStudents) {
      const sName = s.name.replace(/\s+/g,' ').trim();
      const rName = r.sender.replace(/\s+/g,' ').trim();
      if (sName === rName) { autoMatch = s; bestScore = 100; break; }
      if (rName.includes(sName) || sName.includes(rName)) {
        const score = Math.min(sName.length, rName.length) / Math.max(sName.length, rName.length) * 80;
        if (score > bestScore) { bestScore = score; autoMatch = s; }
      }
      // Try matching by parts
      const sParts = sName.split(' ');
      const rParts = rName.split(' ');
      const commonParts = sParts.filter(p => p.length > 2 && rParts.some(rp => rp.includes(p) || p.includes(rp)));
      const partScore = commonParts.length / Math.max(sParts.length, rParts.length) * 70;
      if (partScore > bestScore) { bestScore = partScore; autoMatch = s; }
    }

    const isAuto = bestScore >= 50;

    html += `<div class="wa-result-item">
      <div class="wa-result-sender">${esc(r.sender)}</div>`;

    if (r.urls.length) {
      html += r.urls.map(u => `<div class="wa-result-content"><a href="${esc(u)}" target="_blank">${esc(u)}</a></div>`).join('');
    }
    if (r.files.length) {
      html += r.files.map(f => {
        const media = waMediaFiles[f];
        if (media && media.type && media.type.startsWith('image/')) {
          return `<div class="wa-result-file">📎 ${esc(f)} <a href="${media.url}" target="_blank" style="color:var(--accent)">[عرض]</a></div>
                  <img src="${media.url}" style="max-width:200px;max-height:150px;border-radius:6px;margin:4px 0;border:1px solid var(--border)">`;
        }
        if (media) {
          return `<div class="wa-result-file">📎 ${esc(f)} <a href="${media.url}" download="${esc(f)}" style="color:var(--accent)">[تحميل]</a></div>`;
        }
        return `<div class="wa-result-file">📎 ${esc(f)}</div>`;
      }).join('');
    }
    if (r.hasAttachments && r.files.length === 0) {
      html += `<div class="wa-result-file">📎 ملف/صورة مرفقة</div>`;
    }

    html += `<div class="wa-result-match">
        <span style="font-size:13px">ربط مع:</span>
        <select id="waMatch-${idx}" onchange="updateWaMatchStatus(${idx})">
          <option value="">— اختاري الطالبة —</option>
          <option value="__NEW__">+ إضافة كطالبة جديدة</option>
          ${gradeStudents.map(s => `<option value="${esc(s.id)}" ${isAuto && autoMatch && s.id === autoMatch.id ? 'selected' : ''}>${esc(s.name)} (${esc(s.division || '')})</option>`).join('')}
        </select>
        ${isAuto ? '<span class="match-status match-auto">تطابق تلقائي</span>' : '<span class="match-status match-manual">اختاري يدوياً</span>'}
      </div>
    </div>`;
  });

  html += `<button class="wa-save-btn" onclick="saveWaImport()">💾 حفظ الروابط للطالبات</button>`;
  resultsDiv.innerHTML = html;
}

function updateWaMatchStatus(idx) {
  // Visual feedback only
}

function saveWaImport() {
  const grade = document.getElementById('waGrade').value;
  let saved = 0;
  let added = 0;

  waParseResults.forEach((r, idx) => {
    const select = document.getElementById(`waMatch-${idx}`);
    if (!select) return;
    const val = select.value;
    if (!val) return;

    if (val === '__NEW__') {
      // Add as new student
      const newId = grade + '|' + r.sender;
      if (!students.find(s => s.id === newId)) {
        students.push({
          id: newId,
          name: r.sender,
          grade: grade,
          division: '',
          links: r.urls,
          linkLabels: r.urls.map((u,i) => 'واتساب ' + (i+1)),
          notes: 'تم الإضافة من واتساب'
        });
        added++;
      }
      // Also save links to waLinks
      if (!waLinks[newId]) waLinks[newId] = [];
      r.urls.forEach(u => { if (!waLinks[newId].includes(u)) waLinks[newId].push(u); });
    } else {
      // Link to existing student
      if (!waLinks[val]) waLinks[val] = [];
      r.urls.forEach(u => { if (!waLinks[val].includes(u)) waLinks[val].push(u); });
    }
    saved++;
  });

  localStorage.setItem(WA_STORAGE_KEY, JSON.stringify(waLinks));
  showSaved();
  closeWaImport();
  buildTabs();
  renderList();
  updateStats();

  // Brief alert
  const msg = `تم حفظ روابط ${saved} طالبة` + (added ? ` (${added} طالبة جديدة)` : '');
  const el = document.getElementById('saveIndicator');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); el.textContent = '✓ محفوظ'; }, 2500);
}

// ==== START ====
init();
</script>
</body>
</html>
